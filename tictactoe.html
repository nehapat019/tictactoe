<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6rem;
      color: #a8dadc;
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
    }

    .score-box span {
      display: block;
      font-size: 1.6rem;
      font-weight: bold;
      color: #e94560;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #a8dadc;
    }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px 2px rgba(233, 69, 96, 0.5);
    }

    #reset-btn {
      margin-top: 1.8rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: white;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #reset-btn:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #mode-toggle {
      margin-top: 1rem;
      padding: 0.5rem 1.4rem;
      font-size: 0.9rem;
      border: 2px solid #a8dadc;
      border-radius: 8px;
      background: transparent;
      color: #a8dadc;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #mode-toggle:hover {
      background: #a8dadc;
      color: #1a1a2e;
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>

  <div id="score">
    <div class="score-box">X <span id="score-x">0</span></div>
    <div class="score-box">Draws <span id="score-d">0</span></div>
    <div class="score-box">O <span id="score-o">0</span></div>
  </div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button id="reset-btn">New Game</button>
  <button id="mode-toggle">vs Computer: OFF</button>

  <script>
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const resetBtn = document.getElementById('reset-btn');
    const modeToggle = document.getElementById('mode-toggle');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreD = document.getElementById('score-d');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, vsComputer;
    let scores = { X: 0, O: 0, D: 0 };
    vsComputer = false;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "Player X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(v => v)) return { winner: 'draw' };
      return null;
    }

    function applyMove(index, player) {
      board[index] = player;
      cells[index].textContent = player;
      cells[index].classList.add(player.toLowerCase(), 'taken');
    }

    function endGame(result) {
      gameOver = true;
      if (result.winner === 'draw') {
        status.textContent = "It's a draw!";
        scores.D++;
        scoreD.textContent = scores.D;
      } else {
        const label = vsComputer && result.winner === 'O' ? 'Computer' : `Player ${result.winner}`;
        status.textContent = `${label} wins!`;
        result.line.forEach(i => cells[i].classList.add('win'));
        scores[result.winner]++;
        scoreX.textContent = scores.X;
        scoreO.textContent = scores.O;
      }
    }

    function minimax(b, isMax) {
      const r = checkWinnerBoard(b);
      if (r === 'O') return 10;
      if (r === 'X') return -10;
      if (b.every(v => v)) return 0;

      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, false));
            b[i] = '';
          }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, true));
            b[i] = '';
          }
        }
        return best;
      }
    }

    function checkWinnerBoard(b) {
      for (const [a, c, d] of WINS) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
      }
      return null;
    }

    function computerMove() {
      let bestVal = -Infinity, bestIdx = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const val = minimax(board, false);
          board[i] = '';
          if (val > bestVal) { bestVal = val; bestIdx = i; }
        }
      }
      if (bestIdx !== -1) {
        applyMove(bestIdx, 'O');
        const result = checkWinner();
        if (result) { endGame(result); return; }
        current = 'X';
        status.textContent = "Player X's turn";
      }
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = parseInt(cell.dataset.index);
        if (gameOver || board[i]) return;
        if (vsComputer && current === 'O') return;

        applyMove(i, current);
        const result = checkWinner();
        if (result) { endGame(result); return; }

        if (vsComputer) {
          current = 'O';
          status.textContent = "Computer is thinking...";
          setTimeout(computerMove, 300);
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `Player ${current}'s turn`;
        }
      });
    });

    resetBtn.addEventListener('click', init);

    modeToggle.addEventListener('click', () => {
      vsComputer = !vsComputer;
      modeToggle.textContent = `vs Computer: ${vsComputer ? 'ON' : 'OFF'}`;
      scores = { X: 0, O: 0, D: 0 };
      scoreX.textContent = 0;
      scoreO.textContent = 0;
      scoreD.textContent = 0;
      init();
    });

    init();
  </script>
</body>
</html>
